{% extends "web/base.html" %}
{% block title %}&#52980;&#54252;&#45324;&#53944; &#47560;&#49828;&#53552; | ITAM &#54252;&#53552;{% endblock %}
{% block content %}
<div class="list-screen service-master-screen"><h2>&#52980;&#54252;&#45324;&#53944; &#47560;&#49828;&#53552;</h2>
<form class="search-box" method="get"><input class="search-input" name="q" value="{{ q }}" placeholder="예) 컴포넌트명:Django 유형:middleware"><button type="submit">&#44160;&#49353;</button><span class="spacer"></span><button type="button" id="save-btn">&#51200;&#51109;</button><button type="button" id="add-btn">&#52628;&#44032;</button><button type="button" id="del-btn">&#49325;&#51228;</button></form>
<datalist id="status-list">{% for v in support_status_codes %}<option value="{{ v }}"></option>{% endfor %}</datalist>
<form id="grid-form" method="post">{% csrf_token %}<input type="hidden" name="action" value="save"><input type="hidden" name="rows_json" id="rows-json"><input type="hidden" name="deleted_ids_json" id="deleted-json">
<div class="wrap"><table id="grid"><thead><tr><th><input type="checkbox" id="all"></th><th>ID</th><th>&#52980;&#54252;&#45324;&#53944;&#47749;</th><th>&#48260;&#51204;</th><th>&#50976;&#54805;</th><th>&#48292;&#45908;&#47749;</th><th>CPE</th><th>EOS</th><th>EOL</th><th>&#51648;&#50896;&#50668;&#48512;</th></tr></thead><tbody>
{% for c in items %}<tr><td><input type="checkbox" class="row-check"></td>
<td><input type="hidden" data-field="id" value="{{ c.id }}"><input type="hidden" data-field="component_mgmt_no" value="{{ c.component_mgmt_no }}"><span>{{ c.component_mgmt_no }}</span></td>
<td><input data-field="product_name" value="{{ c.product_name }}"></td><td><input data-field="version" value="{{ c.version }}"></td><td><select data-field="component_type_code">
<option value="">&#8212; &#49440;&#53469; &#8212;</option>
{% for opt in component_type_options %}<option value="{{ opt.code }}"{% if c.component_type_code and c.component_type_code.code == opt.code %} selected{% endif %}>{{ opt.name }}</option>
{% endfor %}
</select></td>
<td><input data-field="vendor_name" value="{{ c.vendor_name }}"></td><td><input data-field="cpe_name" value="{{ c.cpe_name }}"></td><td><input type="date" data-field="eos_date" value="{{ c.eos_date|date:'Y-m-d' }}"></td><td><input type="date" data-field="eol_date" value="{{ c.eol_date|date:'Y-m-d' }}"></td>
<td><input data-field="support_status_code" list="status-list" value="{{ c.support_status_code.code|default:'' }}"></td></tr>{% endfor %}
</tbody></table></div></form></div>
<div class="bottom-actions">
<div style="width:260px;"></div><div class="pager"></div>
<div class="excel-actions">
<a class="icon-btn" href="?q={{ q }}&export=1" title="&#50641;&#49472; &#45796;&#50868;&#47196;&#46300;" aria-label="&#50641;&#49472; &#45796;&#50868;&#47196;&#46300;">&#8595;</a>
<form id="excel-import-form" method="post" enctype="multipart/form-data" style="display:inline;">{% csrf_token %}<input type="hidden" name="action" value="import"><input type="file" id="excel-file-input" class="hidden-file-input" name="excel_file" accept=".xlsx,.xls"><button type="button" class="icon-btn" id="excel-import-btn" title="&#50641;&#49472; &#50629;&#47196;&#46300;" aria-label="&#50641;&#49472; &#50629;&#47196;&#46300;">&#8593;</button></form>
</div></div>
<script>
(()=>{const t=grid,f=document.getElementById("grid-form"),r=document.getElementById("rows-json"),d=document.getElementById("deleted-json"),del=[];const tbody=t.querySelector("tbody");const markRowDirty=(el)=>{const tr=el.closest("tr");const chk=tr?tr.querySelector(".row-check"):null;if(chk)chk.checked=true;};tbody.addEventListener("input",e=>{const el=e.target;if(el&&el.matches("[data-field]")&&el.type!=="hidden")markRowDirty(el);});tbody.addEventListener("change",e=>{const el=e.target;if(el&&el.matches("[data-field]")&&el.type!=="hidden")markRowDirty(el);});all.onchange=e=>t.querySelectorAll(".row-check").forEach(x=>x.checked=e.target.checked);document.getElementById("add-btn").onclick=()=>{const tr=t.querySelector("tbody tr");if(!tr)return;const n=tr.cloneNode(true);n.querySelectorAll("input").forEach(i=>{if(i.dataset.field==="id")i.value="";else if(i.dataset.field!=="component_mgmt_no")i.value="";if(i.classList.contains("row-check"))i.checked=true;});n.querySelectorAll("select[data-field]").forEach(s=>{s.value="";});t.querySelector("tbody").appendChild(n);};document.getElementById("del-btn").onclick=()=>t.querySelectorAll("tbody tr").forEach(tr=>{const c=tr.querySelector(".row-check");if(c&&c.checked){const id=tr.querySelector('[data-field="id"]').value;if(id)del.push(id);tr.remove();}});document.getElementById("save-btn").onclick=()=>{const rows=[...t.querySelectorAll("tbody tr")].filter(tr=>tr.querySelector(".row-check")?.checked).map(tr=>{const o={};tr.querySelectorAll("[data-field]").forEach(i=>o[i.dataset.field]=i.value);return o;});r.value=JSON.stringify(rows);d.value=JSON.stringify(del);f.submit();};const importBtn=document.getElementById("excel-import-btn"),importInput=document.getElementById("excel-file-input"),importForm=document.getElementById("excel-import-form");importBtn?.addEventListener("click",()=>importInput?.click());importInput?.addEventListener("change",()=>{if(importInput.files&&importInput.files.length>0)importForm.submit();});})();
</script>
{% endblock %}
