{% extends "web/base.html" %}
{% block title %}시스템 통합정보 | IT구성관리 시스템{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css">
<script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
<style>
  /* .list-screen 클래스를 함께 사용 → 다른 마스터와 동일한 외곽 레이아웃·h2 위치 */
  .iv-body {
    flex: 1;
    display: grid;
    grid-template-columns: 12% 88%;
    gap: 10px;
    min-height: 0;
  }
  .iv-tree-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .iv-tree-scroll {
    flex: 1;
    overflow: auto;
    min-height: 0;
    /* 조건/그리드 레이아웃 변화 시에도 트리 영역이 0 높이로 붕괴하지 않도록 */
    min-height: 160px;
  }
  .iv-panel {
    border: 1px solid #cfd5e3;
    border-radius: 6px;
    background: #fff;
    padding: 10px;
    overflow: auto;
    min-height: 0;
  }
  .iv-panel-title {
    font-size: 13px;
    font-weight: bold;
    color: #1f2a44;
    margin: 0 0 8px 0;
    padding-bottom: 6px;
    border-bottom: 1px solid #e5e9f2;
  }
  .iv-right {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
    min-height: 0;
  }
  .iv-tree { font-size: 13px; }
  .iv-group { margin-bottom: 8px; }
  .iv-group-header {
    cursor: pointer;
    user-select: none;
    background: #eef3ff;
    border: 1px solid #cfd8ef;
    padding: 4px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #22304f;
    font-weight: bold;
  }
  .iv-group-header .toggle { width: 0.8rem; display: inline-block; text-align: center; }
  .iv-group-fields { padding: 6px 4px 0 22px; }
  .iv-field {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    line-height: 1.4;
  }
  .iv-field input[type="checkbox"] { margin: 0; }
  .iv-field .iv-type-tag {
    font-size: 11px;
    color: #6c7a96;
    margin-left: 4px;
  }
  .iv-cond-toolbar-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0 0 6px 0;
  }
  .iv-text-filters-row {
    min-width: 0;
  }
  .iv-text-filters-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    max-height: 200px;
    overflow: auto;
    padding: 2px 2px 4px 0;
  }
  .iv-cond-toolbar-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .iv-cond-toolbar-bottom .spacer {
    flex: 1;
    min-width: 12px;
  }
  .iv-cond-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .iv-cond-actions .iv-cond-plain {
    display: inline-block;
    box-sizing: border-box;
    padding: 6px 10px;
    min-height: 32px;
    border: 1px solid #999;
    border-radius: 2px;
    background: #efefef;
    color: #000;
    font-size: 13px;
    line-height: 1.2;
    cursor: pointer;
    white-space: nowrap;
  }
  .iv-cond-actions .iv-cond-plain:hover { background: #e5e5e5; }
  .iv-cond-actions .excel-actions.iv-cond-excel {
    min-width: 0;
    gap: 0;
    justify-content: flex-end;
  }
  .iv-text-cond-set {
    display: flex;
    gap: 6px;
    align-items: center;
    border: 1px solid #e5e9f2;
    border-radius: 6px;
    padding: 6px 8px;
    background: #fafbff;
    min-width: 0;
    box-sizing: border-box;
  }
  /* 서비스 마스터 상단 검색창(.search-input)과 동일한 입력 칸 크기·테두리 */
  .iv-text-cond-set input.iv-text-filter {
    flex: 1;
    min-width: 0;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    padding: 6px 10px;
    min-height: 32px;
    font-size: 13px;
    line-height: 1.2;
    border: 1px solid #999;
    border-radius: 2px;
  }
  .iv-text-cond-set .iv-text-reset-btn {
    flex-shrink: 0;
    display: inline-block;
    box-sizing: border-box;
    padding: 6px 10px;
    min-height: 32px;
    font-size: 13px;
    line-height: 1.2;
    cursor: pointer;
    border: 1px solid #999;
    border-radius: 2px;
    background: #efefef;
    color: #000;
    white-space: nowrap;
  }
  .iv-text-cond-set .iv-text-reset-btn:hover { background: #e5e5e5; }
  .iv-cond-toolbar-bottom .iv-summary {
    color: #555;
    font-size: 12px;
    white-space: nowrap;
  }
  .iv-item-filter-row input {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    font-size: 12px;
  }

  .iv-preset-box {
    flex-shrink: 0;
  }
  .iv-preset-box button {
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #999;
    background: #efefef;
    border-radius: 4px;
  }
  .iv-preset-box button:hover { background: #e5e5e5; }
  .iv-preset-box .iv-fav-load.iv-fav-saved {
    background: #efefef;
    border-color: #999;
    color: #222;
  }
  .iv-preset-box .iv-fav-load:not(.iv-fav-saved) {
    background: #fff;
    border-color: #cfd5e3;
    color: #5a6478;
  }
  .iv-preset-box .iv-fav-load:not(.iv-fav-saved):hover { background: #f7f8fb; }
  .iv-preset-grid { display: grid; gap: 6px; }
  .iv-preset-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center; }
  .iv-grid-wrap { flex: 1; min-height: 0; }
  #iv-grid-host { width: 100%; height: 100%; }
  .iv-alert {
    margin-bottom: 8px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    display: none;
  }
  .iv-alert.show { display: block; }
  .iv-alert.error { background: #fce8e6; border: 1px solid #d97a73; color: #882f29; }
  .iv-alert.info { background: #e8f0fe; border: 1px solid #8aa6e0; color: #1c3a8a; }
  .iv-empty { padding: 12px; color: #888; font-size: 13px; }
</style>

<div class="list-screen iv-screen">
  <h2>시스템 통합정보</h2>
  <div class="iv-alert" id="iv-alert"></div>
  <div class="iv-body">
    <aside class="iv-panel iv-tree-panel">
      <p class="iv-panel-title">조회 항목 선택</p>
      <div class="iv-preset-box" style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #e5e9f2;">
        <div class="iv-preset-grid">
          <div class="iv-preset-row">
            <button type="button" class="iv-fav-load" id="iv-fav-load-1">즐겨찾기 1</button>
            <button type="button" id="iv-fav-save-1">저장</button>
            <button type="button" id="iv-fav-clear-1">초기화</button>
          </div>
          <div class="iv-preset-row">
            <button type="button" class="iv-fav-load" id="iv-fav-load-2">즐겨찾기 2</button>
            <button type="button" id="iv-fav-save-2">저장</button>
            <button type="button" id="iv-fav-clear-2">초기화</button>
          </div>
          <div class="iv-preset-row">
            <button type="button" class="iv-fav-load" id="iv-fav-load-3">즐겨찾기 3</button>
            <button type="button" id="iv-fav-save-3">저장</button>
            <button type="button" id="iv-fav-clear-3">초기화</button>
          </div>
        </div>
      </div>
      <div class="iv-item-filter-row" style="margin-bottom:8px;">
        <div style="font-size:12px;color:#556;font-weight:bold;margin-bottom:4px;">조회항목 검색</div>
        <input type="text" id="iv-item-filter" placeholder="좌측 항목 라벨 필터">
      </div>
      <div class="iv-tree iv-tree-scroll" id="iv-tree"></div>
    </aside>
    <section class="iv-right">
      <div class="iv-panel iv-conditions">
        <p class="iv-panel-title">조회 조건</p>
        <div class="iv-cond-toolbar-wrap">
          <div class="iv-text-filters-row">
            <div class="iv-text-filters-grid" id="iv-text-filters"></div>
          </div>
          <div class="iv-cond-toolbar-bottom">
            <span class="iv-summary" id="iv-summary"></span>
            <span class="spacer"></span>
            <div class="iv-cond-actions">
              <button type="button" class="iv-cond-plain" id="iv-search-btn">검색</button>
              <button type="button" class="iv-cond-plain" id="iv-reset-btn">초기화</button>
              {% if can_export %}
              <div class="excel-actions iv-cond-excel">
                <button type="button" class="icon-btn" id="iv-export-btn" title="엑셀 다운로드" aria-label="엑셀 다운로드">&#8595;</button>
              </div>
              {% endif %}
            </div>
          </div>
        </div>
      </div>
      <div class="iv-panel" style="display:flex; flex-direction:column;">
        <div class="iv-grid-wrap" id="iv-grid-wrap">
          <div id="iv-grid-host"></div>
          <div class="iv-empty" id="iv-empty" style="display:none;">조회 결과가 없습니다</div>
        </div>
      </div>
    </section>
  </div>
</div>

<script id="iv-meta-data" type="application/json">{{ view_field_meta|safe }}</script>
<script>
(() => {
  const META = JSON.parse(document.getElementById("iv-meta-data").textContent || "{}");
  const groups = META.groups || [];
  const fieldIndex = {};
  groups.forEach(g => g.fields.forEach(f => { fieldIndex[f.field_id] = { ...f, group: g.key, group_label: g.label }; }));

  const SEARCH_URL = "{% url 'web:integrated_view_search' %}";
  const EXPORT_URL = "{% url 'web:integrated_view_export' %}";
  const PRESETS_URL = "{% url 'web:integrated_view_presets' %}";
  const PRESETS_SAVE_URL = "{% url 'web:integrated_view_presets_save' %}";
  const PRESETS_CLEAR_URL = "{% url 'web:integrated_view_presets_clear' %}";
  const csrftoken = (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || "";

  const $tree = document.getElementById("iv-tree");
  const $itemFilter = document.getElementById("iv-item-filter");
  const $textFilters = document.getElementById("iv-text-filters");
  const $alert = document.getElementById("iv-alert");
  const $summary = document.getElementById("iv-summary");
  const $empty = document.getElementById("iv-empty");
  const $gridHost = document.getElementById("iv-grid-host");

  let grid = null;
  let lastResult = null;

  // ── 상태 보존 (sessionStorage: 동일 탭 내 화면 이동 시 복원) ──
  const STATE_KEY = "iv:state:v2";
  function saveState() {
    try {
      const state = {
        selectedFields: getSelectedFieldIds(),
        textFilters: collectTextFilters(),
        lastResult: lastResult,
      };
      sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    } catch (e) { /* quota or unavailable */ }
  }
  function loadState() {
    try {
      const raw = sessionStorage.getItem(STATE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function clearState() {
    try { sessionStorage.removeItem(STATE_KEY); } catch (e) {}
  }

  function showAlert(text, level) {
    $alert.className = "iv-alert show " + (level || "info");
    $alert.textContent = text || "";
  }
  function clearAlert() { $alert.className = "iv-alert"; $alert.textContent = ""; }

  // ── 좌측 트리 렌더 ────────────────────────────────────────────
  function renderTree() {
    $tree.innerHTML = "";
    groups.forEach(g => {
      const wrap = document.createElement("div");
      wrap.className = "iv-group";
      const header = document.createElement("div");
      header.className = "iv-group-header";
      header.innerHTML = `<span class="toggle">▼</span><label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;"><input type="checkbox" data-role="group-all" data-group="${g.key}"> <span>${escapeHtml(g.label)}</span></label>`;
      const body = document.createElement("div");
      body.className = "iv-group-fields";
      g.fields.forEach(f => {
        const row = document.createElement("div");
        row.className = "iv-field";
        row.innerHTML = `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;width:100%;"><input type="checkbox" data-role="field" data-field-id="${f.field_id}" data-data-type="${f.data_type}"><span>${escapeHtml(f.label)}</span><span class="iv-type-tag">[${f.data_type}]</span></label>`;
        body.appendChild(row);
      });
      header.querySelector(".toggle").addEventListener("click", (e) => {
        e.stopPropagation();
        const t = header.querySelector(".toggle");
        if (body.style.display === "none") { body.style.display = ""; t.textContent = "▼"; }
        else { body.style.display = "none"; t.textContent = "▶"; }
      });
      wrap.appendChild(header);
      wrap.appendChild(body);
      $tree.appendChild(wrap);
    });
    $tree.addEventListener("change", (e) => {
      const t = e.target;
      if (!t || !$tree.contains(t)) return;
      if (t && t.dataset.role === "group-all") {
        const group = t.dataset.group;
        $tree.querySelectorAll(`input[data-role="field"]`).forEach(inp => {
          const f = fieldIndex[inp.dataset.fieldId];
          if (f && f.group === group) inp.checked = t.checked;
        });
        saveState();
      } else if (t && t.dataset.role === "field") {
        saveState();
      }
    });
  }

  function getSelectedFieldIds() {
    return Array.from($tree.querySelectorAll('input[data-role="field"]:checked'))
      .map(inp => inp.dataset.fieldId);
  }

  function clearAllFieldSelections() {
    $tree.querySelectorAll('input[data-role="field"], input[data-role="group-all"]').forEach(inp => {
      inp.checked = false;
    });
  }

  function hasNoSavedPresets(presets) {
    if (!presets || typeof presets !== "object") return true;
    return ![1, 2, 3].some((slot) => {
      const p = presets[String(slot)];
      return p != null && typeof p === "object";
    });
  }

  function clearScreenToNoSelection() {
    clearAllFieldSelections();
    resetTextFiltersToDefault();
    if ($itemFilter) $itemFilter.value = "";
    lastResult = null;
    if (grid) { try { grid.destroy(); } catch (e) {} grid = null; }
    $gridHost.innerHTML = "";
    $empty.style.display = "none";
    $gridHost.style.display = "";
    $summary.textContent = "";
  }

  function syncFavoriteLoadButtons(presets) {
    const map = presets && typeof presets === "object" ? presets : {};
    [1, 2, 3].forEach((slot) => {
      const btn = document.getElementById(`iv-fav-load-${slot}`);
      if (!btn) return;
      const p = map[String(slot)];
      if (p != null && typeof p === "object") btn.classList.add("iv-fav-saved");
      else btn.classList.remove("iv-fav-saved");
    });
  }

  const TEXT_FILTER_SLOT_COUNT = 5;

  function collectTextFilters() {
    return Array.from($textFilters.querySelectorAll("input.iv-text-filter")).map(inp => inp.value);
  }

  function addTextFilterRow(value) {
    const wrap = document.createElement("div");
    wrap.className = "iv-text-cond-set";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.className = "iv-text-filter";
    inp.placeholder = "예) ITGC:Y 또는 서비스명=PMO";
    if (value) inp.value = value;
    const btnReset = document.createElement("button");
    btnReset.type = "button";
    btnReset.className = "iv-text-reset-btn";
    btnReset.textContent = "초기화";
    btnReset.addEventListener("click", () => {
      inp.value = "";
      saveState();
      if (getSelectedFieldIds().length) void runSearch();
    });
    inp.addEventListener("input", saveState);
    wrap.appendChild(inp);
    wrap.appendChild(btnReset);
    $textFilters.appendChild(wrap);
  }

  function resetTextFiltersToDefault() {
    $textFilters.innerHTML = "";
    for (let i = 0; i < TEXT_FILTER_SLOT_COUNT; i++) addTextFilterRow("");
  }

  function applyTextFiltersFromList(arr) {
    $textFilters.innerHTML = "";
    const raw = Array.isArray(arr) ? arr.slice() : [];
    while (raw.length < TEXT_FILTER_SLOT_COUNT) raw.push("");
    const list = raw.slice(0, TEXT_FILTER_SLOT_COUNT);
    list.forEach(v => addTextFilterRow(v));
  }

  // ── 검색/그리드 ──────────────────────────────────────────────
  async function postJson(url, body) {
    const res = await fetch(url, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-Requested-With": "XMLHttpRequest",
        "X-CSRFToken": csrftoken,
      },
      body: JSON.stringify(body || {}),
    });
    if ((res.headers.get("content-type") || "").includes("application/json")) {
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || `요청 실패 (${res.status})`);
      return data;
    }
    if (!res.ok) throw new Error(`요청 실패 (${res.status})`);
    return res;
  }

  function buildGrid(columns) {
    if (grid) { try { grid.destroy(); } catch (e) {} grid = null; }
    $gridHost.innerHTML = "";
    grid = new tui.Grid({
      el: $gridHost,
      data: [],
      bodyHeight: "fitToParent",
      columnOptions: { resizable: true },
      scrollX: true,
      scrollY: true,
      columns: columns.map(c => ({ name: c.field_id, header: c.label, width: 128, minWidth: 64 })),
    });
  }

  async function runSearch() {
    clearAlert();
    const fids = getSelectedFieldIds();
    if (!fids.length) {
      showAlert("좌측에서 조회 항목을 1개 이상 선택하세요.", "error");
      return;
    }
    try {
      const data = await postJson(SEARCH_URL, {
        selected_fields: fids,
        text_filters: collectTextFilters(),
      });
      lastResult = data.result;
      renderResult(lastResult);
      saveState();
    } catch (e) {
      showAlert(e.message || String(e), "error");
    }
  }

  function renderResult(result) {
    if (!result.rows || !result.rows.length) {
      if (grid) { try { grid.resetData([]); } catch (e) {} }
      $empty.style.display = "";
      $gridHost.style.display = "none";
      $summary.textContent = `조회 결과가 없습니다`;
      return;
    }
    $empty.style.display = "none";
    $gridHost.style.display = "";
    buildGrid(result.columns);
    grid.resetData(result.rows);
    $summary.textContent = `총 조회건수: ${result.total}건`;
  }

  // ── 엑셀 ───────────────────────────────────────────────────
  async function runExport() {
    const fids = getSelectedFieldIds();
    if (!fids.length) {
      showAlert("좌측에서 조회 항목을 1개 이상 선택하세요.", "error");
      return;
    }
    const body = { selected_fields: fids, text_filters: collectTextFilters() };
    const res = await fetch(EXPORT_URL, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-Requested-With": "XMLHttpRequest",
        "X-CSRFToken": csrftoken,
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      try {
        const data = await res.json();
        showAlert(data.error || `다운로드 실패 (${res.status})`, "error");
      } catch (e) {
        showAlert(`다운로드 실패 (${res.status})`, "error");
      }
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "integrated_view.xlsx";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

  async function resetAllFiltersUi() {
    resetTextFiltersToDefault();
    clearAlert();
    saveState();
    const fids = getSelectedFieldIds();
    if (fids.length) {
      await runSearch();
      return;
    }
    lastResult = null;
    if (grid) { try { grid.destroy(); } catch (e) {} grid = null; }
    $gridHost.innerHTML = "";
    $empty.style.display = "none";
    $gridHost.style.display = "";
    $summary.textContent = "";
    saveState();
  }

  function restoreState() {
    const state = loadState();
    if (!state) return;
    if (Array.isArray(state.selectedFields)) {
      const wanted = new Set(state.selectedFields);
      $tree.querySelectorAll('input[data-role="field"]').forEach(inp => {
        if (wanted.has(inp.dataset.fieldId) && fieldIndex[inp.dataset.fieldId]) {
          inp.checked = true;
        }
      });
    }
    if (Array.isArray(state.textFilters)) {
      applyTextFiltersFromList(state.textFilters);
    } else if (Array.isArray(state.conditions) && state.conditions.length && typeof state.conditions[0] === "string") {
      applyTextFiltersFromList(state.conditions);
    } else {
      resetTextFiltersToDefault();
    }
    if (state.lastResult && Array.isArray(state.lastResult.columns) && Array.isArray(state.lastResult.rows)) {
      lastResult = state.lastResult;
      renderResult(lastResult);
    }
  }

  // ── 초기화 ───────────────────────────────────────────────────
  renderTree();
  resetTextFiltersToDefault();
  document.getElementById("iv-search-btn").addEventListener("click", () => runSearch());
  $textFilters.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const t = e.target;
    if (!t || !t.classList || !t.classList.contains("iv-text-filter")) return;
    e.preventDefault();
    runSearch();
  });
  document.getElementById("iv-reset-btn").addEventListener("click", () => { void resetAllFiltersUi(); });
  const expBtn = document.getElementById("iv-export-btn");
  if (expBtn) expBtn.addEventListener("click", runExport);

  function applyTreeFilter(term) {
    const t = String(term || "").trim().toLowerCase();
    const groupsEls = Array.from($tree.querySelectorAll(".iv-group"));
    groupsEls.forEach(gEl => {
      /* 그룹 헤더는 항상 유지 → 필터 결과가 없어도 트리 구조가 통째로 사라지지 않음 */
      gEl.style.display = "";
      const header = gEl.querySelector(".iv-group-header");
      if (header) header.style.display = "";
      const fields = Array.from(gEl.querySelectorAll(".iv-field"));
      fields.forEach(fEl => {
        const label = (fEl.textContent || "").toLowerCase();
        const show = !t || label.includes(t);
        fEl.style.display = show ? "" : "none";
      });
    });
  }
  if ($itemFilter) {
    $itemFilter.addEventListener("input", () => applyTreeFilter($itemFilter.value));
    $itemFilter.addEventListener("change", () => applyTreeFilter($itemFilter.value));
  }

  async function fetchPresets() {
    const res = await fetch(PRESETS_URL, { credentials: "same-origin" });
    if (!res.ok) throw new Error(`프리셋 조회 실패 (${res.status})`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "프리셋 조회 실패");
    return data.presets || {};
  }

  async function savePreset(slot) {
    const body = {
      slot: slot,
      selected_fields: getSelectedFieldIds(),
      text_filters: collectTextFilters(),
      name: "",
    };
    const data = await postJson(PRESETS_SAVE_URL, body);
    const presets = await fetchPresets();
    syncFavoriteLoadButtons(presets);
    return data.preset;
  }

  async function clearFavoriteSlot(slot) {
    await postJson(PRESETS_CLEAR_URL, { slot: slot });
    const presets = await fetchPresets();
    syncFavoriteLoadButtons(presets);
  }

  function applyPreset(p) {
    if (!p) return;
    const wanted = new Set(Array.isArray(p.selected_fields) ? p.selected_fields : []);
    $tree.querySelectorAll('input[data-role="field"]').forEach(inp => {
      inp.checked = wanted.has(inp.dataset.fieldId);
    });
    const tf = Array.isArray(p.text_filters) ? p.text_filters : [];
    applyTextFiltersFromList(tf);
    saveState();
  }

  async function loadPreset(slot) {
    const presets = await fetchPresets();
    syncFavoriteLoadButtons(presets);
    const p = presets[String(slot)];
    if (!p) {
      clearScreenToNoSelection();
      saveState();
      return;
    }
    applyPreset(p);
    await runSearch();
  }

  function bindFavRow(slot) {
    document.getElementById(`iv-fav-save-${slot}`).addEventListener("click", async () => {
      try { clearAlert(); await savePreset(slot); } catch (e) { showAlert(e.message || String(e), "error"); }
    });
    document.getElementById(`iv-fav-clear-${slot}`).addEventListener("click", async () => {
      try { clearAlert(); await clearFavoriteSlot(slot); } catch (e) { showAlert(e.message || String(e), "error"); }
    });
    document.getElementById(`iv-fav-load-${slot}`).addEventListener("click", async () => {
      try { clearAlert(); await loadPreset(slot); } catch (e) { showAlert(e.message || String(e), "error"); }
    });
  }
  bindFavRow(1);
  bindFavRow(2);
  bindFavRow(3);

  (async function bootstrapFromPresets() {
    let presets = null;
    try {
      presets = await fetchPresets();
    } catch (e) {
      showAlert(e.message || String(e), "error");
      restoreState();
      return;
    }
    syncFavoriteLoadButtons(presets);
    if (hasNoSavedPresets(presets)) {
      clearState();
      clearScreenToNoSelection();
      saveState();
      return;
    }
    restoreState();
  })();
})();
</script>
{% endblock %}
